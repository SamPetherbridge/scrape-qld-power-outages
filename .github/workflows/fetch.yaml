name: Scrape latest data

on:
  schedule:
    - cron: '*/5 * * * *'   # Runs every 6 hours
  workflow_dispatch:

jobs:
  scheduled:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out this repo
        uses: actions/checkout@v2
        with:
            persist-credentials: true
        
      - name: Fetch latest data
        run: |-
          # Energex (South East Queensland) via ArcGIS Feature Service
          curl -s "https://services.arcgis.com/bfVzktoY0OhzQCDj/ArcGIS/rest/services/VwEnergexOutages/FeatureServer/0/query?where=TYPE%3D%27UNPLANNED%27&outFields=*&f=geojson" > energex-unplanned.geojson
          curl -s "https://services.arcgis.com/bfVzktoY0OhzQCDj/ArcGIS/rest/services/VwEnergexOutages/FeatureServer/0/query?where=TYPE%3D%27PLANNED%27&outFields=*&f=geojson" > energex-planned.geojson
          # Ergon (Regional Queensland) via ArcGIS Feature Service
          curl -s "https://services.arcgis.com/33eHbTVqo7gtiCE8/arcgis/rest/services/VwErgonOutages/FeatureServer/0/query?where=TYPE%3D%27UNPLANNED%27&outFields=*&f=geojson" > ergon-unplanned.geojson
          curl -s "https://services.arcgis.com/33eHbTVqo7gtiCE8/arcgis/rest/services/VwErgonOutages/FeatureServer/0/query?where=TYPE%3D%27PLANNED%27&outFields=*&f=geojson" > ergon-planned.geojson
      
      - name: Commit and push if it changed
        run: |-
          git config user.name "Automated"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          timestamp=$(date -u)
          git commit -m "Latest data: ${timestamp}" || exit 0
          git pull --rebase
          git push
